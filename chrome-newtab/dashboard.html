<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Memento</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <main id="app">
    <header id="hero" class="hero">
      <h1>Memento</h1>
      <p id="status" class="status">尚未授权访问数据目录</p>
    </header>

    <section id="grant-section" class="grant-card">
      <h2>授权一次,以后自动加载</h2>
      <p class="muted">
        首次使用需要授权 Chrome 读取你的 Memento 数据目录(默认 <code>~/AISecretary</code>)。
        授权信息保存在浏览器本地 IndexedDB,扩展不联网、不上传任何数据。
      </p>
      <button id="grant-btn" class="cta-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 4h4l3 3h7a2 2 0 0 1 2 2v8a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-11a2 2 0 0 1 2 -2"/>
        </svg>
        <span class="btn-label">授权数据目录</span>
      </button>
    </section>

    <section id="dashboard-section" hidden>
      <div id="todo-banner" class="todo-banner"></div>

      <div class="prompt-row">
        <label for="prompt-select">附 prompt:</label>
        <select id="prompt-select" aria-label="选择 prompt 模式"></select>
      </div>

      <div class="cta-row">
        <button id="copy-btn" class="cta-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="9" y="3" width="6" height="4" rx="2"/>
            <path d="M9 5h-2a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-12a2 2 0 0 0 -2 -2h-2"/>
          </svg>
          <span class="btn-label">复制今天 → AI</span>
        </button>
        <button id="easter-egg" class="memento-egg" title="" aria-label="Memento 模式">
          <span class="egg-photo">M</span>
        </button>
      </div>

      <div id="stats" class="stats"></div>
      <div id="heatmap" class="heatmap"></div>
      <div class="heatmap-legend"><span>90 天前</span><span>今天</span></div>

      <div id="section-today" class="section-divider"><span></span></div>
      <div id="chips" class="chips"></div>
      <div id="entry-list"></div>
    </section>

    <footer class="footnote">v0.5.0 · 归档库 MVP</footer>
  </main>

  <!-- 右边缘触发条 -->
  <button id="archive-tab" class="archive-tab" hidden aria-label="打开归档库">
    <span class="at-label">归档</span>
    <span id="archive-count" class="at-count"></span>
  </button>

  <!-- 右侧抽屉 -->
  <div id="drawer-scrim" class="drawer-scrim"></div>
  <aside id="archive-drawer" class="archive-drawer" aria-label="HTML 归档库">
    <div class="drawer-head">
      <span class="drawer-title">归档 · ARCHIVES</span>
      <button id="drawer-close" class="drawer-close" aria-label="关闭">✕</button>
    </div>
    <div id="archive-drop" class="archive-drop">
      <input type="file" id="archive-input" accept=".html,.htm,text/html" multiple hidden>
      <span class="ad-icon" aria-hidden="true">⬆</span>
      <span class="ad-text">拖 HTML 到这里,或<u>点击选择</u></span>
      <span class="ad-hint">存进 ~/AISecretary/.archives/</span>
    </div>
    <div id="archive-list" class="archive-list"></div>
  </aside>

  <script src="prompts.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
