<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AISecretary</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <main id="app">
    <header id="hero" class="hero">
      <h1>AISecretary</h1>
      <p id="status" class="status">尚未授权访问 ~/AISecretary</p>
    </header>

    <section id="grant-section" class="grant-card">
      <h2>授权一次,以后自动加载</h2>
      <p class="muted">
        首次使用需要授权 Chrome 读取 <code>~/AISecretary</code> 文件夹。
        授权信息保存在浏览器本地 IndexedDB,扩展不联网、不上传任何数据。
      </p>
      <button id="grant-btn" class="cta-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 4h4l3 3h7a2 2 0 0 1 2 2v8a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-11a2 2 0 0 1 2 -2"/>
        </svg>
        <span class="btn-label">授权 ~/AISecretary 文件夹</span>
      </button>
    </section>

    <section id="dashboard-section" hidden>
      <div id="todo-banner" class="todo-banner"></div>

      <button id="copy-btn" class="cta-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="9" y="3" width="6" height="4" rx="2"/>
          <path d="M9 5h-2a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-12a2 2 0 0 0 -2 -2h-2"/>
        </svg>
        <span class="btn-label">复制今天 → AI</span>
      </button>

      <div id="stats" class="stats"></div>
      <div id="heatmap" class="heatmap"></div>
      <div class="heatmap-legend"><span>90 天前</span><span>今天</span></div>

      <div id="section-today" class="section-divider"><span></span></div>
      <div id="chips" class="chips"></div>
      <div id="entry-list"></div>
    </section>

    <footer class="footnote">v0.4.0 · 完整 MVP</footer>
  </main>
  <script src="dashboard.js"></script>
</body>
</html>
