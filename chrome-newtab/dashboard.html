<!DOCTYPE html>

</head>
<body>

    <header class="hero">
      <h1>AISecretary</h1>
      <p id="status" class="status">尚未授权访问 ~/AISecretary</p>
    </header>

    <section id="grant-section" class="grant-card">
      <h2>授权一次,以后自动加载</h2>

        授权 ~/AISecretary 文件夹

    </section>

    <footer class="footnote">v0.1.0 · 骨架版</footer>
  </main>
  <script src="dashboard.js"></script>

</html>
